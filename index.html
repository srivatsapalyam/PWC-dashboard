<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PwC Finance Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080e1a; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #080e1a; }
    ::-webkit-scrollbar-thumb { background: rgba(200,169,110,0.3); border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const {
      AreaChart, Area, BarChart, Bar, LineChart, Line,
      XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer,
      PieChart, Pie, Cell, ComposedChart
    } = Recharts;
    const { useState, useEffect } = React;

    const revenueData = [
      { month: "Jul", revenue: 4.2, target: 4.0, ebitda: 1.1 },
      { month: "Aug", revenue: 4.5, target: 4.2, ebitda: 1.2 },
      { month: "Sep", revenue: 4.1, target: 4.3, ebitda: 1.0 },
      { month: "Oct", revenue: 4.8, target: 4.5, ebitda: 1.35 },
      { month: "Nov", revenue: 5.1, target: 4.7, ebitda: 1.48 },
      { month: "Dec", revenue: 5.6, target: 5.0, ebitda: 1.62 },
      { month: "Jan", revenue: 5.3, target: 5.2, ebitda: 1.55 },
    ];

    const cashFlowData = [
      { month: "Jul", operating: 0.8, investing: -0.3, financing: -0.2, net: 0.3 },
      { month: "Aug", operating: 0.9, investing: -0.4, financing: -0.1, net: 0.4 },
      { month: "Sep", operating: 0.7, investing: -0.2, financing: -0.3, net: 0.2 },
      { month: "Oct", operating: 1.1, investing: -0.5, financing: -0.15, net: 0.45 },
      { month: "Nov", operating: 1.2, investing: -0.3, financing: -0.2, net: 0.7 },
      { month: "Dec", operating: 1.4, investing: -0.6, financing: -0.1, net: 0.7 },
      { month: "Jan", operating: 1.3, investing: -0.4, financing: -0.25, net: 0.65 },
    ];

    const expenseData = [
      { month: "Jul", cogs: 1.6, sga: 0.9, rd: 0.6, da: 0.4 },
      { month: "Aug", cogs: 1.7, sga: 0.95, rd: 0.62, da: 0.41 },
      { month: "Sep", cogs: 1.55, sga: 0.88, rd: 0.58, da: 0.4 },
      { month: "Oct", cogs: 1.82, sga: 1.0, rd: 0.65, da: 0.42 },
      { month: "Nov", cogs: 1.94, sga: 1.05, rd: 0.7, da: 0.43 },
      { month: "Dec", cogs: 2.13, sga: 1.15, rd: 0.75, da: 0.44 },
      { month: "Jan", cogs: 2.01, sga: 1.1, rd: 0.72, da: 0.44 },
    ];

    const expenseBreakdown = [
      { name: "COGS", value: 38, color: "#c8a96e" },
      { name: "SG&A", value: 22, color: "#e8c98a" },
      { name: "R&D", value: 15, color: "#6ee7b7" },
      { name: "D&A", value: 10, color: "#4a6fa5" },
      { name: "Other", value: 15, color: "#334466" },
    ];

    const dsoData = [
      { month: "Jul", dso: 52 },
      { month: "Aug", dso: 49 },
      { month: "Sep", dso: 55 },
      { month: "Oct", dso: 47 },
      { month: "Nov", dso: 44 },
      { month: "Dec", dso: 41 },
      { month: "Jan", dso: 38 },
    ];

    const workingCapitalData = [
      { month: "Jul", receivables: 1.8, inventory: 0.9, payables: -0.7, wc: 2.0 },
      { month: "Aug", receivables: 1.75, inventory: 0.88, payables: -0.72, wc: 1.91 },
      { month: "Sep", receivables: 1.9, inventory: 0.92, payables: -0.68, wc: 2.14 },
      { month: "Oct", receivables: 1.7, inventory: 0.85, payables: -0.75, wc: 1.8 },
      { month: "Nov", receivables: 1.6, inventory: 0.82, payables: -0.78, wc: 1.64 },
      { month: "Dec", receivables: 1.5, inventory: 0.78, payables: -0.8, wc: 1.48 },
      { month: "Jan", receivables: 1.42, inventory: 0.75, payables: -0.83, wc: 1.34 },
    ];

    const kpis = [
      { label: "Total Revenue", value: "$5.3B", change: "+12.4%", up: true, sub: "vs prior year" },
      { label: "EBITDA Margin", value: "29.2%", change: "+2.1pp", up: true, sub: "vs prior year" },
      { label: "Free Cash Flow", value: "$1.05B", change: "+8.7%", up: true, sub: "YTD" },
      { label: "DSO", value: "38 days", change: "-14 days", up: true, sub: "vs Jul baseline" },
      { label: "Working Capital", value: "$1.34B", change: "-33%", up: true, sub: "efficiency gain" },
      { label: "Net Debt Ratio", value: "1.8x", change: "-0.3x", up: true, sub: "leverage improved" },
    ];

    const card = {
      background: "linear-gradient(135deg,rgba(255,255,255,0.03),rgba(255,255,255,0.01))",
      border: "1px solid rgba(200,169,110,0.12)", borderRadius: 12, padding: "22px 24px",
    };
    const sLabel = { fontSize: 10, letterSpacing: "0.12em", color: "#7788aa", textTransform: "uppercase", marginBottom: 4 };
    const sTitle = { fontSize: 16, fontWeight: 600, color: "#f5ecd7", marginBottom: 18 };

    const TT = ({ active, payload, label }) => {
      if (!active || !payload?.length) return null;
      return (
        <div style={{ background: "rgba(8,14,26,0.97)", border: "1px solid rgba(200,169,110,0.3)", borderRadius: 8, padding: "10px 14px", fontSize: 12, color: "#e2d5b8" }}>
          <p style={{ color: "#c8a96e", marginBottom: 6, fontWeight: 600 }}>{label}</p>
          {payload.map((p, i) => (
            <p key={i} style={{ color: p.color, margin: "2px 0" }}>
              {p.name}: <strong>{typeof p.value === "number" ? (Math.abs(p.value) < 10 ? `$${Math.abs(p.value).toFixed(2)}B` : `${p.value}d`) : p.value}</strong>
            </p>
          ))}
        </div>
      );
    };

    function OverviewTab({ animated, hovK, setHovK }) {
      return (
        <div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(6,1fr)", gap: 14, marginBottom: 28 }}>
            {kpis.map((k, i) => (
              <div key={i} onMouseEnter={() => setHovK(i)} onMouseLeave={() => setHovK(null)} style={{
                ...card,
                border: hovK === i ? "1px solid rgba(200,169,110,0.4)" : card.border,
                background: hovK === i ? "linear-gradient(135deg,rgba(200,169,110,0.12),rgba(42,58,92,0.2))" : card.background,
                opacity: animated ? 1 : 0, transform: animated ? "translateY(0)" : "translateY(16px)",
                transition: `all 0.35s ease ${i * 60}ms`, cursor: "default",
              }}>
                <div style={{ fontSize: 10, letterSpacing: "0.12em", color: "#7788aa", textTransform: "uppercase", marginBottom: 8 }}>{k.label}</div>
                <div style={{ fontSize: 20, fontWeight: 700, color: "#f5ecd7", marginBottom: 6 }}>{k.value}</div>
                <div style={{ fontSize: 11, fontWeight: 600, color: k.up ? "#6ee7b7" : "#f87171" }}>{k.change}</div>
                <div style={{ fontSize: 10, color: "#445566", marginTop: 3 }}>{k.sub}</div>
              </div>
            ))}
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 18, marginBottom: 18 }}>
            <div style={card}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 20 }}>
                <div><div style={sLabel}>Revenue Performance</div><div style={{ ...sTitle, marginBottom: 0 }}>Revenue vs Target · EBITDA</div></div>
                <div style={{ display: "flex", gap: 16, fontSize: 11 }}>
                  <span style={{ color: "#c8a96e" }}>● Revenue</span><span style={{ color: "#4a6fa5" }}>● Target</span><span style={{ color: "#6ee7b7" }}>● EBITDA</span>
                </div>
              </div>
              <ResponsiveContainer width="100%" height={200}>
                <AreaChart data={revenueData} margin={{ top: 5, right: 5, left: -20, bottom: 0 }}>
                  <defs>
                    <linearGradient id="rg" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#c8a96e" stopOpacity={0.2} /><stop offset="95%" stopColor="#c8a96e" stopOpacity={0} /></linearGradient>
                    <linearGradient id="eg" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#6ee7b7" stopOpacity={0.15} /><stop offset="95%" stopColor="#6ee7b7" stopOpacity={0} /></linearGradient>
                  </defs>
                  <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" />
                  <XAxis dataKey="month" tick={{ fill: "#556677", fontSize: 11 }} axisLine={false} tickLine={false} />
                  <YAxis tick={{ fill: "#556677", fontSize: 10 }} axisLine={false} tickLine={false} tickFormatter={v => `$${v}B`} />
                  <Tooltip content={<TT />} />
                  <Area type="monotone" dataKey="revenue" name="Revenue" stroke="#c8a96e" strokeWidth={2} fill="url(#rg)" dot={{ fill: "#c8a96e", r: 3 }} />
                  <Line type="monotone" dataKey="target" name="Target" stroke="#4a6fa5" strokeWidth={1.5} strokeDasharray="5 3" dot={false} />
                  <Area type="monotone" dataKey="ebitda" name="EBITDA" stroke="#6ee7b7" strokeWidth={1.5} fill="url(#eg)" dot={{ fill: "#6ee7b7", r: 3 }} />
                </AreaChart>
              </ResponsiveContainer>
            </div>
            <div style={card}>
              <div style={sLabel}>Cost Structure</div>
              <div style={sTitle}>Expense Breakdown</div>
              <ResponsiveContainer width="100%" height={140}>
                <PieChart>
                  <Pie data={expenseBreakdown} cx="50%" cy="50%" innerRadius={45} outerRadius={65} dataKey="value" stroke="none">
                    {expenseBreakdown.map((e, i) => <Cell key={i} fill={e.color} />)}
                  </Pie>
                  <Tooltip formatter={v => `${v}%`} contentStyle={{ background: "#0f172a", border: "1px solid #c8a96e33", borderRadius: 8, color: "#e2d5b8", fontSize: 12 }} />
                </PieChart>
              </ResponsiveContainer>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "6px 12px", marginTop: 8 }}>
                {expenseBreakdown.map((item, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 7, fontSize: 11 }}>
                    <div style={{ width: 8, height: 8, borderRadius: 2, background: item.color, flexShrink: 0 }} />
                    <span style={{ color: "#8899aa" }}>{item.name}</span>
                    <span style={{ color: "#c8a96e", marginLeft: "auto", fontWeight: 600 }}>{item.value}%</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 18 }}>
            <div style={card}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 18 }}>
                <div><div style={sLabel}>Liquidity</div><div style={{ ...sTitle, marginBottom: 0 }}>Cash Flow Summary</div></div>
                <div style={{ display: "flex", gap: 12, fontSize: 11 }}><span style={{ color: "#6ee7b7" }}>● Operating</span><span style={{ color: "#f87171" }}>● Investing</span></div>
              </div>
              <ResponsiveContainer width="100%" height={160}>
                <BarChart data={cashFlowData} margin={{ top: 0, right: 5, left: -20, bottom: 0 }} barSize={12}>
                  <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" vertical={false} />
                  <XAxis dataKey="month" tick={{ fill: "#556677", fontSize: 11 }} axisLine={false} tickLine={false} />
                  <YAxis tick={{ fill: "#556677", fontSize: 10 }} axisLine={false} tickLine={false} tickFormatter={v => `$${v}B`} />
                  <Tooltip content={<TT />} />
                  <Bar dataKey="operating" name="Operating" fill="#6ee7b7" radius={[3,3,0,0]} fillOpacity={0.8} />
                  <Bar dataKey="investing" name="Investing" fill="#f87171" radius={[3,3,0,0]} fillOpacity={0.8} />
                </BarChart>
              </ResponsiveContainer>
            </div>
            <div style={card}>
              <div style={sLabel}>Receivables Efficiency</div>
              <div style={{ ...sTitle, marginBottom: 14 }}>Days Sales Outstanding</div>
              <div style={{ display: "flex", alignItems: "center", gap: 20, marginBottom: 14 }}>
                <div><div style={{ fontSize: 32, fontWeight: 700, color: "#6ee7b7" }}>38</div><div style={{ fontSize: 11, color: "#556677" }}>days · Jan 2026</div></div>
                <div style={{ background: "rgba(110,231,183,0.1)", border: "1px solid rgba(110,231,183,0.2)", borderRadius: 8, padding: "8px 14px" }}>
                  <div style={{ fontSize: 11, color: "#6ee7b7", fontWeight: 600 }}>↓ 14 days</div><div style={{ fontSize: 10, color: "#445566" }}>since Jul</div>
                </div>
                <div style={{ background: "rgba(200,169,110,0.08)", border: "1px solid rgba(200,169,110,0.2)", borderRadius: 8, padding: "8px 14px" }}>
                  <div style={{ fontSize: 11, color: "#c8a96e", fontWeight: 600 }}>Target: 35d</div><div style={{ fontSize: 10, color: "#445566" }}>Q2 2026</div>
                </div>
              </div>
              <ResponsiveContainer width="100%" height={100}>
                <AreaChart data={dsoData} margin={{ top: 0, right: 5, left: -20, bottom: 0 }}>
                  <defs><linearGradient id="dg" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#6ee7b7" stopOpacity={0.15} /><stop offset="95%" stopColor="#6ee7b7" stopOpacity={0} /></linearGradient></defs>
                  <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" />
                  <XAxis dataKey="month" tick={{ fill: "#556677", fontSize: 10 }} axisLine={false} tickLine={false} />
                  <YAxis tick={{ fill: "#556677", fontSize: 10 }} axisLine={false} tickLine={false} domain={[30, 60]} />
                  <Tooltip contentStyle={{ background: "#0f172a", border: "1px solid #c8a96e33", borderRadius: 8, color: "#e2d5b8", fontSize: 12 }} />
                  <Area type="monotone" dataKey="dso" name="DSO (days)" stroke="#6ee7b7" strokeWidth={2} fill="url(#dg)" dot={{ fill: "#6ee7b7", r: 3 }} />
                </AreaChart>
              </ResponsiveContainer>
            </div>
          </div>
        </div>
      );
    }

    function CashFlowTab() {
      const cfk = [
        { label: "Operating CF", value: "$1.30B", change: "+62.5%", up: true, sub: "vs Jul" },
        { label: "Investing CF", value: "-$0.40B", change: "Capex up", up: false, sub: "growth investment" },
        { label: "Financing CF", value: "-$0.25B", change: "Stable", up: true, sub: "debt repayment" },
        { label: "Net Cash", value: "$0.65B", change: "+117%", up: true, sub: "vs Jul baseline" },
      ];
      return (
        <div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 14, marginBottom: 28 }}>
            {cfk.map((k, i) => (
              <div key={i} style={card}>
                <div style={{ fontSize: 10, letterSpacing: "0.12em", color: "#7788aa", textTransform: "uppercase", marginBottom: 8 }}>{k.label}</div>
                <div style={{ fontSize: 22, fontWeight: 700, color: "#f5ecd7", marginBottom: 6 }}>{k.value}</div>
                <div style={{ fontSize: 11, fontWeight: 600, color: k.up ? "#6ee7b7" : "#f87171" }}>{k.change}</div>
                <div style={{ fontSize: 10, color: "#445566", marginTop: 3 }}>{k.sub}</div>
              </div>
            ))}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "3fr 2fr", gap: 18, marginBottom: 18 }}>
            <div style={card}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 18 }}>
                <div><div style={sLabel}>Monthly Breakdown</div><div style={{ ...sTitle, marginBottom: 0 }}>Cash Flow by Category</div></div>
                <div style={{ display: "flex", gap: 12, fontSize: 11 }}>
                  <span style={{ color: "#6ee7b7" }}>● Operating</span><span style={{ color: "#f87171" }}>● Investing</span><span style={{ color: "#4a6fa5" }}>● Financing</span>
                </div>
              </div>
              <ResponsiveContainer width="100%" height={230}>
                <BarChart data={cashFlowData} margin={{ top: 5, right: 5, left: -20, bottom: 0 }} barSize={14}>
                  <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" vertical={false} />
                  <XAxis dataKey="month" tick={{ fill: "#556677", fontSize: 11 }} axisLine={false} tickLine={false} />
                  <YAxis tick={{ fill: "#556677", fontSize: 10 }} axisLine={false} tickLine={false} tickFormatter={v => `$${v}B`} />
                  <Tooltip content={<TT />} />
                  <Bar dataKey="operating" name="Operating" fill="#6ee7b7" radius={[3,3,0,0]} fillOpacity={0.85} />
                  <Bar dataKey="investing" name="Investing" fill="#f87171" radius={[3,3,0,0]} fillOpacity={0.85} />
                  <Bar dataKey="financing" name="Financing" fill="#4a6fa5" radius={[3,3,0,0]} fillOpacity={0.85} />
                </BarChart>
              </ResponsiveContainer>
            </div>
            <div style={card}>
              <div style={sLabel}>Trend</div>
              <div style={sTitle}>Net Cash Position</div>
              <div style={{ fontSize: 32, fontWeight: 700, color: "#6ee7b7", marginBottom: 4 }}>$0.65B</div>
              <div style={{ fontSize: 11, color: "#556677", marginBottom: 16 }}>Jan 2026 · Net Cash Generated</div>
              <ResponsiveContainer width="100%" height={160}>
                <AreaChart data={cashFlowData} margin={{ top: 5, right: 5, left: -20, bottom: 0 }}>
                  <defs><linearGradient id="ng" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#c8a96e" stopOpacity={0.25} /><stop offset="95%" stopColor="#c8a96e" stopOpacity={0} /></linearGradient></defs>
                  <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" />
                  <XAxis dataKey="month" tick={{ fill: "#556677", fontSize: 10 }} axisLine={false} tickLine={false} />
                  <YAxis tick={{ fill: "#556677", fontSize: 10 }} axisLine={false} tickLine={false} tickFormatter={v => `$${v}B`} />
                  <Tooltip content={<TT />} />
                  <Area type="monotone" dataKey="net" name="Net Cash" stroke="#c8a96e" strokeWidth={2} fill="url(#ng)" dot={{ fill: "#c8a96e", r: 3 }} />
                </AreaChart>
              </ResponsiveContainer>
            </div>
          </div>
          <div style={card}>
            <div style={sLabel}>Cash Conversion</div>
            <div style={{ ...sTitle, marginBottom: 20 }}>Cash Flow Summary Table · FY2026 YTD</div>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
              <thead>
                <tr style={{ borderBottom: "1px solid rgba(200,169,110,0.2)" }}>
                  {["Month","Operating CF","Investing CF","Financing CF","Net Cash","Cumulative"].map(h => (
                    <th key={h} style={{ padding: "8px 12px", textAlign: h==="Month"?"left":"right", color: "#7788aa", fontWeight: 500, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {cashFlowData.map((row, i) => {
                  const cum = cashFlowData.slice(0,i+1).reduce((s,r)=>s+r.net,0);
                  return (
                    <tr key={i} style={{ borderBottom: "1px solid rgba(255,255,255,0.04)" }}
                      onMouseEnter={e=>e.currentTarget.style.background="rgba(200,169,110,0.05)"}
                      onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                      <td style={{ padding:"10px 12px", color:"#c8a96e", fontWeight:600 }}>{row.month}</td>
                      <td style={{ padding:"10px 12px", textAlign:"right", color:"#6ee7b7" }}>${row.operating.toFixed(2)}B</td>
                      <td style={{ padding:"10px 12px", textAlign:"right", color:"#f87171" }}>${row.investing.toFixed(2)}B</td>
                      <td style={{ padding:"10px 12px", textAlign:"right", color:"#4a6fa5" }}>${row.financing.toFixed(2)}B</td>
                      <td style={{ padding:"10px 12px", textAlign:"right", color:"#f5ecd7", fontWeight:600 }}>${row.net.toFixed(2)}B</td>
                      <td style={{ padding:"10px 12px", textAlign:"right", color:"#c8a96e" }}>${cum.toFixed(2)}B</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function ExpensesTab() {
      const ek = [
        { label: "Total OpEx", value: "$4.31B", change: "+10.2%", up: false, sub: "YTD Jan 2026" },
        { label: "COGS Ratio", value: "37.9%", change: "-0.4pp", up: true, sub: "margin improvement" },
        { label: "SG&A Ratio", value: "20.8%", change: "-0.9pp", up: true, sub: "efficiency gain" },
        { label: "R&D Spend", value: "$0.72B", change: "+20%", up: true, sub: "strategic investment" },
      ];
      return (
        <div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 14, marginBottom: 28 }}>
            {ek.map((k,i) => (
              <div key={i} style={card}>
                <div style={{ fontSize:10, letterSpacing:"0.12em", color:"#7788aa", textTransform:"uppercase", marginBottom:8 }}>{k.label}</div>
                <div style={{ fontSize:22, fontWeight:700, color:"#f5ecd7", marginBottom:6 }}>{k.value}</div>
                <div style={{ fontSize:11, fontWeight:600, color: k.up?"#6ee7b7":"#f87171" }}>{k.change}</div>
                <div style={{ fontSize:10, color:"#445566", marginTop:3 }}>{k.sub}</div>
              </div>
            ))}
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"2fr 1fr", gap:18, marginBottom:18 }}>
            <div style={card}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:18 }}>
                <div><div style={sLabel}>Cost Trend</div><div style={{ ...sTitle, marginBottom:0 }}>Expense Stack by Category</div></div>
                <div style={{ display:"flex", gap:12, fontSize:11 }}>
                  <span style={{ color:"#c8a96e" }}>● COGS</span><span style={{ color:"#e8c98a" }}>● SG&A</span><span style={{ color:"#6ee7b7" }}>● R&D</span><span style={{ color:"#4a6fa5" }}>● D&A</span>
                </div>
              </div>
              <ResponsiveContainer width="100%" height={230}>
                <BarChart data={expenseData} margin={{ top:5, right:5, left:-20, bottom:0 }} barSize={18}>
                  <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" vertical={false} />
                  <XAxis dataKey="month" tick={{ fill:"#556677", fontSize:11 }} axisLine={false} tickLine={false} />
                  <YAxis tick={{ fill:"#556677", fontSize:10 }} axisLine={false} tickLine={false} tickFormatter={v=>`$${v}B`} />
                  <Tooltip content={<TT />} />
                  <Bar dataKey="cogs" name="COGS" fill="#c8a96e" stackId="a" fillOpacity={0.9} />
                  <Bar dataKey="sga" name="SG&A" fill="#e8c98a" stackId="a" fillOpacity={0.9} />
                  <Bar dataKey="rd" name="R&D" fill="#6ee7b7" stackId="a" fillOpacity={0.9} />
                  <Bar dataKey="da" name="D&A" fill="#4a6fa5" stackId="a" radius={[4,4,0,0]} fillOpacity={0.9} />

              </ResponsiveContainer>
            </div>
            <div style={card}>
              <div style={sLabel}>Cost Mix</div>
              <div style={sTitle}>% of Revenue</div>
              <ResponsiveContainer width="100%" height={170}>
                <PieChart>
                  <Pie data={expenseBreakdown} cx="50%" cy="50%" outerRadius={72} dataKey="value" stroke="none">
                    {expenseBreakdown.map((e,i)=><Cell key={i} fill={e.color} />)}
                  </Pie>
                  <Tooltip formatter={v=>`${v}%`} contentStyle={{ background:"#0f172a", border:"1px solid #c8a96e33", borderRadius:8, color:"#e2d5b8", fontSize:12 }} />
                </PieChart>
              </ResponsiveContainer>
              <div style={{ marginTop:8 }}>
                {expenseBreakdown.map((item,i)=>(
                  <div key={i} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"5px 0", borderBottom:"1px solid rgba(255,255,255,0.04)", fontSize:11 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}><div style={{ width:8, height:8, borderRadius:2, background:item.color }} /><span style={{ color:"#8899aa" }}>{item.name}</span></div>
                    <span style={{ color:"#c8a96e", fontWeight:600 }}>{item.value}%</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
          <div style={card}>
            <div style={sLabel}>Optimisation Opportunities</div>
            <div style={{ ...sTitle, marginBottom:20 }}>Cost Reduction Initiative Tracker</div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:14 }}>
              {[
                { title:"Procurement Consolidation", saving:"$45M", status:"In Progress", pct:65, color:"#c8a96e" },
                { title:"Shared Services Migration", saving:"$32M", status:"Planning", pct:30, color:"#4a6fa5" },
                { title:"Automation (AP/AR)", saving:"$28M", status:"Completed", pct:100, color:"#6ee7b7" },
                { title:"Real Estate Rationalisation", saving:"$18M", status:"In Progress", pct:50, color:"#c8a96e" },
                { title:"IT Vendor Consolidation", saving:"$22M", status:"Planning", pct:20, color:"#4a6fa5" },
                { title:"Travel Policy Reform", saving:"$9M", status:"Completed", pct:100, color:"#6ee7b7" },
              ].map((item,i)=>(
                <div key={i} style={{ background:"rgba(255,255,255,0.02)", borderRadius:8, padding:"14px 16px", border:"1px solid rgba(255,255,255,0.06)" }}>
                  <div style={{ fontSize:12, color:"#e2d5b8", fontWeight:600, marginBottom:6 }}>{item.title}</div>
                  <div style={{ fontSize:20, color:item.color, fontWeight:700, marginBottom:4 }}>{item.saving}</div>
                  <div style={{ fontSize:10, color:"#556677", marginBottom:10 }}>{item.status}</div>
                  <div style={{ height:4, background:"rgba(255,255,255,0.06)", borderRadius:2 }}>
                    <div style={{ height:"100%", width:`${item.pct}%`, background:item.color, borderRadius:2 }} />
                  </div>
                  <div style={{ fontSize:10, color:"#445566", marginTop:4, textAlign:"right" }}>{item.pct}%</div>
                </div>
              ))}

          </div>

      );
    }

    function WorkingCapitalTab() {
      const wk = [
        { label:"Working Capital", value:"$1.34B", change:"-33%", up:true, sub:"efficiency gain vs Jul" },
        { label:"Receivables", value:"$1.42B", change:"-$0.38B", up:true, sub:"collections improved" },
        { label:"Inventory", value:"$0.75B", change:"-$0.15B", up:true, sub:"lean improvement" },
        { label:"Payables", value:"$0.83B", change:"+$0.13B", up:true, sub:"extended terms" },
      ];
      return (
        <div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:14, marginBottom:28 }}>
            {wk.map((k,i)=>(
              <div key={i} style={card}>
                <div style={{ fontSize:10, letterSpacing:"0.12em", color:"#7788aa", textTransform:"uppercase", marginBottom:8 }}>{k.label}</div>
                <div style={{ fontSize:22, fontWeight:700, color:"#f5ecd7", marginBottom:6 }}>{k.value}</div>
                <div style={{ fontSize:11, fontWeight:600, color:k.up?"#6ee7b7":"#f87171" }}>{k.change}</div>
                <div style={{ fontSize:10, color:"#445566", marginTop:3 }}>{k.sub}</div>
              </div>
            ))}
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"3fr 2fr", gap:18, marginBottom:18 }}>

              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:18 }}>
                <div><div style={sLabel}>Components</div><div style={{ ...sTitle, marginBottom:0 }}>Working Capital Drivers</div></div>

                  <span style={{ color:"#c8a96e" }}>● Receivables</span><span style={{ color:"#6ee7b7" }}>● Inventory</span><span style={{ color:"#f87171" }}>● Payables</span><span style={{ color:"#f0dba8" }}>— Net WC</span>
                </div>
              </div>
              <ResponsiveContainer width="100%" height={230}>
                <ComposedChart data={workingCapitalData} margin={{ top:5, right:5, left:-20, bottom:0 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" />
                  <XAxis dataKey="month" tick={{ fill:"#556677", fontSize:11 }} axisLine={false} tickLine={false} />
                  <YAxis tick={{ fill:"#556677", fontSize:10 }} axisLine={false} tickLine={false} tickFormatter={v=>`$${Math.abs(v)}B`} />
                  <Tooltip content={<TT />} />
                  <Bar dataKey="receivables" name="Receivables" fill="#c8a96e" fillOpacity={0.8} barSize={10} radius={[3,3,0,0]} />
                  <Bar dataKey="inventory" name="Inventory" fill="#6ee7b7" fillOpacity={0.8} barSize={10} radius={[3,3,0,0]} />
                  <Bar dataKey="payables" name="Payables" fill="#f87171" fillOpacity={0.8} barSize={10} radius={[3,3,0,0]} />
                  <Line type="monotone" dataKey="wc" name="Net WC" stroke="#f0dba8" strokeWidth={2.5} dot={{ fill:"#f0dba8", r:4 }} />
                </ComposedChart>
              </ResponsiveContainer>
            </div>
            <div style={card}>
              <div style={sLabel}>Efficiency</div>
              <div style={sTitle}>DSO · DIO · DPO Metrics</div>
              {[
                { label:"DSO (Days Sales Outstanding)", value:38, max:60, color:"#6ee7b7", desc:"Target: 35 days" },
                { label:"DIO (Days Inventory Outstanding)", value:28, max:50, color:"#c8a96e", desc:"Target: 25 days" },
                { label:"DPO (Days Payable Outstanding)", value:52, max:75, color:"#4a6fa5", desc:"Target: 60 days" },
              ].map((item,i)=>(
                <div key={i} style={{ marginBottom:18 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6, fontSize:11 }}>
                    <span style={{ color:"#8899aa" }}>{item.label}</span>
                    <span style={{ color:item.color, fontWeight:700 }}>{item.value}d</span>
                  </div>
                  <div style={{ height:6, background:"rgba(255,255,255,0.06)", borderRadius:3, overflow:"hidden" }}>
                    <div style={{ height:"100%", width:`${(item.value/item.max)*100}%`, background:item.color, borderRadius:3 }} />
                  </div>
                  <div style={{ fontSize:10, color:"#445566", marginTop:4 }}>{item.desc}</div>
                </div>
              ))}
              <div style={{ padding:"12px 14px", background:"rgba(200,169,110,0.06)", borderRadius:8, border:"1px solid rgba(200,169,110,0.15)" }}>
                <div style={{ fontSize:10, color:"#7788aa", textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:4 }}>Cash Conversion Cycle</div>
                <div style={{ fontSize:24, color:"#c8a96e", fontWeight:700 }}>14 days</div>
                <div style={{ fontSize:11, color:"#556677" }}>DSO + DIO − DPO</div>
              </div>
            </div>
          </div>
          <div style={card}>
            <div style={sLabel}>Optimisation Actions</div>
            <div style={{ ...sTitle, marginBottom:20 }}>Working Capital Improvement Initiatives</div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:14 }}>
              {[
                { area:"Receivables", action:"Invoice automation & e-billing rollout", impact:"-6 DSO days", status:"Live", color:"#6ee7b7" },
                { area:"Inventory", action:"JIT replenishment model implementation", impact:"-3 DIO days", status:"Q2 2026", color:"#c8a96e" },
                { area:"Payables", action:"Supplier payment term renegotiation", impact:"+8 DPO days", status:"In Progress", color:"#4a6fa5" },
                { area:"Collections", action:"Early payment discount programme", impact:"$18M cash release", status:"Live", color:"#6ee7b7" },
                { area:"Inventory", action:"SKU rationalisation (20% reduction)", impact:"$32M released", status:"Planning", color:"#c8a96e" },
                { area:"Treasury", action:"Cash pooling across 12 entities", impact:"$45M optimised", status:"Q3 2026", color:"#4a6fa5" },
              ].map((item,i)=>(
                <div key={i} style={{ background:"rgba(255,255,255,0.02)", borderRadius:8, padding:"14px 16px", border:"1px solid rgba(255,255,255,0.06)" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
                    <span style={{ fontSize:10, color:item.color, fontWeight:600, textTransform:"uppercase", letterSpacing:"0.1em" }}>{item.area}</span>
                    <span style={{ fontSize:10, color:"#445566", background:"rgba(255,255,255,0.04)", padding:"2px 8px", borderRadius:4 }}>{item.status}</span>
                  </div>
                  <div style={{ fontSize:12, color:"#e2d5b8", marginBottom:8, lineHeight:1.4 }}>{item.action}</div>
                  <div style={{ fontSize:14, color:item.color, fontWeight:700 }}>{item.impact}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [activeTab, setActiveTab] = useState("overview");
      const [animated, setAnimated] = useState(false);
      const [hovK, setHovK] = useState(null);
      useEffect(() => { setTimeout(() => setAnimated(true), 100); }, []);
      const tabs = ["overview", "cash flow", "expenses", "working capital"];

      return (
        <div style={{ minHeight:"100vh", background:"#080e1a", fontFamily:"'Georgia','Times New Roman',serif", color:"#e2d5b8", position:"relative" }}>
          <div style={{ position:"fixed", inset:0, zIndex:0, background:"radial-gradient(ellipse at 20% 20%,rgba(200,169,110,0.04) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(42,58,92,0.15) 0%,transparent 50%)", pointerEvents:"none" }} />
          <div style={{ height:3, background:"linear-gradient(90deg,transparent,#c8a96e,#f0dba8,#c8a96e,transparent)" }} />
          <div style={{ position:"relative", zIndex:1, padding:"28px 40px 20px", borderBottom:"1px solid rgba(200,169,110,0.15)", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <div style={{ display:"flex", alignItems:"center", gap:14 }}>
              <div style={{ width:36, height:36, borderRadius:"50%", background:"linear-gradient(135deg,#c8a96e,#f0dba8)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, fontWeight:700, color:"#080e1a" }}>F</div>
              <div>
                <div style={{ fontSize:11, letterSpacing:"0.18em", color:"#c8a96e", textTransform:"uppercase", marginBottom:2 }}>Finance Transformation Office</div>
                <h1 style={{ fontSize:22, fontWeight:700, margin:0, color:"#f5ecd7" }}>Executive Finance Dashboard</h1>
              </div>
            </div>
            <div style={{ textAlign:"right" }}>
              <div style={{ fontSize:11, color:"#8899aa", letterSpacing:"0.1em", textTransform:"uppercase" }}>Reporting Period</div>
              <div style={{ fontSize:15, color:"#c8a96e", fontWeight:600, marginTop:2 }}>FY2026 · Jan YTD</div>
              <div style={{ fontSize:11, color:"#556677", marginTop:2 }}>Last updated: 12 Mar 2026</div>
            </div>
          </div>
          <div style={{ display:"flex", padding:"0 40px", borderBottom:"1px solid rgba(200,169,110,0.12)", position:"relative", zIndex:1 }}>
            {tabs.map(tab => (
              <button key={tab} onClick={() => setActiveTab(tab)} style={{
                background:"none", border:"none", cursor:"pointer", padding:"14px 22px",
                fontSize:12, letterSpacing:"0.1em", textTransform:"uppercase",
                color: activeTab===tab ? "#c8a96e" : "#556677",
                borderBottom: activeTab===tab ? "2px solid #c8a96e" : "2px solid transparent",
                transition:"all 0.2s", fontFamily:"inherit",
              }}>{tab}</button>
            ))}
          </div>
          <div style={{ position:"relative", zIndex:1, padding:"28px 40px" }}>
            {activeTab==="overview"        && <OverviewTab animated={animated} hovK={hovK} setHovK={setHovK} />}
            {activeTab==="cash flow"       && <CashFlowTab />}
            {activeTab==="expenses"        && <ExpensesTab />}
            {activeTab==="working capital" && <WorkingCapitalTab />}
            <div style={{ marginTop:24, paddingTop:16, borderTop:"1px solid rgba(200,169,110,0.1)", display:"flex", justifyContent:"space-between", fontSize:10, color:"#334455", letterSpacing:"0.08em" }}>
              <span>FINANCE TRANSFORMATION OFFICE · CONFIDENTIAL</span>
              <span>Built with React · Recharts · FY2026 Data</span>
              <span>© 2026 ACME Corp. All rights reserved.</span>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
